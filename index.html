<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="styles/style.css?v=v214-premium-stable">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#153D39">
<link rel="apple-touch-icon" href="assets/app-icon-192.png">
<title>Méthode Tee</title>
<script>
(function(){
  var search = window.location.search || '';
  var hash = window.location.hash || '';
  if(hash.indexOf('type=recovery') !== -1 || hash.indexOf('access_token=') !== -1 || search.indexOf('type=recovery') !== -1 || search.indexOf('reset=1') !== -1){
    window.location.replace('auth.html' + search + hash);
  }
})();
</script></head>
<body>
<div class="luxury-loader" id="mtBootLoader"><img src="assets/brand-logo.png"><span>Ouverture du club privé</span></div>
<div class="shell">
  <header class="topbar">
    <a class="logo" href="index.html"><img src="assets/brand-logo.png" alt="Méthode Tee"></a>
    <div id="topActions" class="top-actions"></div>
  </header>
  <main class="page home-page">
    <section class="home-hero">
      <div class="kicker">Journal privé</div>
      <h1 class="page-title">Le fil<br><em>Méthode Tee</em></h1>
      <p class="lead">Ton espace vivant : conseils nutrition, plantes, recettes, routines, mindset, challenges et contenus privés.</p>
      <div id="accessGate" class="access-gate hidden">
        <h2>Accès limité verrouillé</h2>
        <p>Cette page est réservée aux clientes ayant activé l’accès privé.</p>
        <a class="main-cta" href="#" onclick="location.href=window.MT_CONFIG.APP_ACCESS_PAYMENT_LINK || '#';return false;">Débloquer l’accès
        </a>
      </div>
      <!-- Place historique exacte de la carte : dans le hero, sans insertion tardive. -->
      <section id="clubIntro" class="club-intro reveal visible mt-stable-slot mt-card-skeleton" aria-busy="true">
        <div class="mt-slot-kicker"></div><div class="mt-slot-title"></div><div class="mt-slot-line"></div><div class="mt-slot-action"></div>
      </section>
    </section>
    <!-- Les autres emplacements restent fixes, sans déplacement après rendu. -->
    <section id="storyRail" class="story-rail mt-stable-slot" hidden aria-busy="true"></section>
    <section id="clubV18Panel" class="club-v18-panel mt-stable-slot" hidden aria-busy="true"></section>
    <section id="privateDrops" class="private-drops mt-stable-slot" hidden aria-busy="true"></section>
    <section id="homeFeed" class="feed-list" aria-live="polite"></section>
  </main>
  <div id="mediaModal" class="media-modal"></div>
  <nav class="navbar" id="bottomNav"></nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>

</body></html>
