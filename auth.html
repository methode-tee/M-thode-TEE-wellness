<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Méthode Tee — Connexion</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="auth-wrap">
  <aside class="auth-side">
    <div class="auth-side-inner">
      <h1>Méthode<br><em>Tee</em></h1>
      <p>Crée ton espace personnel pour accéder à tes guides, ton dashboard intelligent, tes protocoles et tes achats sauvegardés.</p>
    </div>
  </aside>
  <main class="auth-box">
    <form class="form-card" id="authForm">
      <h2 id="authTitle">Connexion</h2>
      <p>Entre dans ton espace Méthode Tee.</p>
      <div class="tabs">
        <button type="button" class="tab active" data-mode="signin">Connexion</button>
        <button type="button" class="tab" data-mode="signup">Inscription</button>
      </div>
      <div class="field hidden" id="nameField">
        <label>Nom</label>
        <input id="fullName" placeholder="Ton prénom">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" required placeholder="email@exemple.com">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input id="password" type="password" required minlength="6" placeholder="••••••••">
      </div>
      <button class="btn sage full" type="submit">Continuer</button>
      <div class="message" id="authMsg"></div>
    </form>
  </main>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>

</body>
</html>
