<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="styles/style.css?v=account-v104">
<style>
  html, body { height: auto !important; min-height: 100% !important; overflow: visible !important; overflow-y: auto !important; }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#153D39">
<link rel="apple-touch-icon" href="assets/app-icon-192.png">
<title>Méthode Tee</title>
</head>
<body class="auth-body"><main class="auth-hero">
<section class="auth-brand">
  <div class="auth-brand-top">
    <div class="pill">Nutrition holistique · Plantes · Bien-être</div>
    <h1>Méthode<br><em>Tee</em></h1>
    <p class="tagline">Ton corps sait. Accompagne-le.</p>
    <p>Connecte-toi à ton espace privé.</p>
  </div>
  <div class="auth-brand-bottom"></div>
</section>
<section class="auth-card">
  <div class="tabs" id="authTabs"><button id="loginTab" class="active" type="button">Connexion</button><button id="signupTab" type="button">Inscription</button></div>
  <form id="authForm">
    <input id="name" placeholder="Nom" class="hidden">
    <label>Email</label><input id="email" type="email" required>
    <label id="passwordLabel">Mot de passe</label><input id="password" type="password" required>
    <button id="authSubmit" type="submit">Continuer</button>
    <button id="forgotPasswordBtn" type="button" class="auth-link-btn">Mot de passe oublié ?</button>
    <p id="authMessage"></p>
  </form>
  <div id="resetPasswordBox" class="auth-reset-box hidden">
    <div class="auth-reset-icon">🔐</div>
    <h2>Nouveau mot de passe</h2>
    <p>Choisis un nouveau mot de passe pour retrouver ton espace Méthode Tee.</p>
    <label>Nouveau mot de passe</label>
    <input id="newPassword" type="password" autocomplete="new-password" minlength="6" placeholder="Minimum 6 caractères">
    <button id="saveNewPasswordBtn" type="button">Enregistrer</button>
    <p id="resetMessage"></p>
  </div>
</section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="supabaseClient.js"></script>
<script>
let mode='login';
const c=initSupabase();
const resetBox=document.getElementById('resetPasswordBox');
const authForm=document.getElementById('authForm');
const authTabs=document.getElementById('authTabs');
const authSubmit=document.getElementById('authSubmit');
const passwordLabel=document.getElementById('passwordLabel');
const forgotBtn=document.getElementById('forgotPasswordBtn');
const emailInput=document.getElementById('email');
const passwordInput=document.getElementById('password');
const nameInput=document.getElementById('name');
const loginTab=document.getElementById('loginTab');
const signupTab=document.getElementById('signupTab');
const authMessage=document.getElementById('authMessage');
const resetMessage=document.getElementById('resetMessage');
const saveNewPasswordBtn=document.getElementById('saveNewPasswordBtn');

function mtSafeNextUrl(){
  const raw = new URLSearchParams(location.search).get('next');
  if(!raw) return 'index.html';
  try{
    const decoded = decodeURIComponent(raw);
    if(decoded.startsWith('http://') || decoded.startsWith('https://') || decoded.startsWith('//')) return 'index.html';
    return decoded || 'index.html';
  }catch(e){ return 'index.html'; }
}

function mtAuthRedirectUrl(){
  return `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, 'auth.html')}?reset=1`;
}

function mtRecoveryParams(){
  const query = new URLSearchParams(window.location.search || '');
  const hashRaw = String(window.location.hash || '').replace(/^#/, '');
  const hash = new URLSearchParams(hashRaw);
  return { query, hash };
}

function mtIsRecoveryUrl(){
  const { query, hash } = mtRecoveryParams();
  return query.get('reset') === '1'
    || query.get('type') === 'recovery'
    || hash.get('type') === 'recovery'
    || query.has('access_token')
    || hash.has('access_token')
    || query.has('code');
}

function showAuthMode(next){
  mode=next;
  resetBox.classList.add('hidden');
  authForm.classList.remove('hidden');
  authTabs.classList.remove('hidden');
  passwordLabel.classList.remove('hidden');
  passwordInput.classList.remove('hidden');
  passwordInput.required = next !== 'forgot';
  forgotBtn.classList.toggle('hidden', next !== 'login');
  nameInput.classList.toggle('hidden', next !== 'signup');
  loginTab.classList.toggle('active', next === 'login');
  signupTab.classList.toggle('active', next === 'signup');
  signupTab.classList.toggle('hidden', next === 'forgot');
  authSubmit.textContent = next === 'forgot' ? 'Recevoir le lien' : 'Continuer';
  authMessage.textContent = '';
  if(next === 'forgot'){
    passwordLabel.classList.add('hidden');
    passwordInput.classList.add('hidden');
    forgotBtn.classList.add('hidden');
    loginTab.textContent='Retour connexion';
    loginTab.classList.add('active');
  }else{
    loginTab.textContent='Connexion';
  }
}

function showResetPassword(){
  authForm.classList.add('hidden');
  authTabs.classList.add('hidden');
  resetBox.classList.remove('hidden');
  resetMessage.textContent = '';
}

async function mtPrepareRecoverySession(){
  if(!mtIsRecoveryUrl()) return false;
  showResetPassword();
  resetMessage.textContent = 'Lien de récupération détecté…';
  const { query } = mtRecoveryParams();
  const code = query.get('code');
  try{
    if(code){
      const { error } = await c.auth.exchangeCodeForSession(code);
      if(error) throw error;
      history.replaceState(null, '', 'auth.html?reset=1');
    }
    const { data } = await c.auth.getSession();
    resetMessage.textContent = data?.session ? '' : 'Entre ton nouveau mot de passe pour finaliser la récupération.';
  }catch(err){
    resetMessage.textContent = err.message || 'Lien de récupération détecté. Entre ton nouveau mot de passe.';
  }
  return true;
}

loginTab.onclick=()=>showAuthMode('login');
signupTab.onclick=()=>showAuthMode('signup');
forgotBtn.onclick=()=>showAuthMode('forgot');

authForm.addEventListener('submit',async e=>{
  e.preventDefault();
  authMessage.textContent='Patiente...';
  try{
    const email=emailInput.value.trim();
    const password=passwordInput.value;
    if(mode==='signup'){
      const r=await c.auth.signUp({email,password,options:{data:{full_name:nameInput.value}}});
      if(r.error)throw r.error;
      if(r.data.user)await c.from('profiles').upsert({id:r.data.user.id,email,full_name:nameInput.value});
      location.href=mtSafeNextUrl();
    }else if(mode==='forgot'){
      const r=await c.auth.resetPasswordForEmail(email,{ redirectTo: mtAuthRedirectUrl() });
      if(r.error)throw r.error;
      authMessage.textContent='Lien envoyé ✨ Vérifie ta boîte mail pour créer un nouveau mot de passe.';
    }else{
      const r=await c.auth.signInWithPassword({email,password});
      if(r.error)throw r.error;
      location.href=mtSafeNextUrl();
    }
  }catch(err){authMessage.textContent=err.message || 'Une erreur est survenue.';}
});

saveNewPasswordBtn.onclick=async()=>{
  resetMessage.textContent='Enregistrement...';
  try{
    const password=document.getElementById('newPassword').value;
    if(!password || password.length<6) throw new Error('Le mot de passe doit contenir au moins 6 caractères.');
    const session = await c.auth.getSession();
    if(!session?.data?.session && mtIsRecoveryUrl()) await mtPrepareRecoverySession();
    const r=await c.auth.updateUser({password});
    if(r.error)throw r.error;
    resetMessage.textContent='Mot de passe modifié ✨ Redirection...';
    setTimeout(()=>location.href=mtSafeNextUrl(),900);
  }catch(err){resetMessage.textContent=err.message || 'Impossible de modifier le mot de passe.';}
};

c.auth.onAuthStateChange((event)=>{
  if(event === 'PASSWORD_RECOVERY') showResetPassword();
});

(async()=>{
  if(!(await mtPrepareRecoverySession())) showAuthMode('login');
})();
</script><script src="scripts/v14-luxe.js?v=153"></script>
</body></html>
