<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="styles/style.css?v=153">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#153D39">
<link rel="apple-touch-icon" href="assets/app-icon-192.png">
<title>Méthode Tee</title>
<style id="navbar-inline">
.shell{padding-bottom:110px!important}
.page{padding-bottom:130px!important}
.navbar{
  position:fixed!important;
  bottom:0!important;
  left:0!important;
  right:0!important;
  top:auto!important;
  z-index:2147483647!important;
  display:flex!important;
  flex-direction:row!important;
  flex-wrap:nowrap!important;
  align-items:center!important;
  justify-content:flex-start!important;
  gap:4px!important;
  overflow-x:auto!important;
  overflow-y:hidden!important;
  -webkit-overflow-scrolling:touch!important;
  scrollbar-width:none!important;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px))!important;
  background:rgba(245,239,230,.97)!important;
  -webkit-backdrop-filter:blur(18px)!important;
  backdrop-filter:blur(18px)!important;
  border-top:1px solid rgba(21,61,57,.10)!important;
  border-radius:0!important;
  box-shadow:none!important;
  transform:none!important;
  width:100%!important;
  max-width:100%!important;
  height:auto!important;
}
.navbar::-webkit-scrollbar{display:none!important}
.navbar a{
  flex:0 0 auto!important;
  width:80px!important;
  min-width:80px!important;
  height:58px!important;
  display:flex!important;
  flex-direction:column!important;
  align-items:center!important;
  justify-content:center!important;
  gap:3px!important;
  padding:6px 4px!important;
  border-radius:14px!important;
  background:transparent!important;
  color:var(--muted)!important;
  transition:background .18s ease,color .18s ease!important;
  text-decoration:none!important;
  border:none!important;
  box-shadow:none!important;
}
.navbar a.active{
  color:var(--green)!important;
  background:rgba(253,250,246,.85)!important;
}
.navbar b{display:block!important;font-size:20px!important;line-height:1!important;height:22px!important;min-height:22px!important;margin:0!important}
.navbar span{display:block!important;width:100%!important;font-size:7.5px!important;font-weight:700!important;letter-spacing:.07em!important;text-transform:uppercase!important;text-align:center!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;opacity:1!important}
.toast-layer{bottom:calc(80px + env(safe-area-inset-bottom,0px))!important}
</style>
</head>
<body class="auth-body"><main class="auth-hero">
<section class="auth-brand"><div class="pill">Nutrition holistique · Plantes · Bien-être</div><h1>Méthode<br><em>Tee</em></h1><p class="tagline">Ton corps sait. Accompagne-le.</p><p>Connecte-toi à ton espace privé.</p></section>
<section class="auth-card"><div class="tabs"><button id="loginTab" class="active">Connexion</button><button id="signupTab">Inscription</button></div><form id="authForm"><input id="name" placeholder="Nom" class="hidden"><label>Email</label><input id="email" type="email" required><label>Mot de passe</label><input id="password" type="password" required><button type="submit">Continuer</button><p id="authMessage"></p></form></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="supabaseClient.js"></script>
<script>
let mode='login';loginTab.onclick=()=>{mode='login';loginTab.classList.add('active');signupTab.classList.remove('active');name.classList.add('hidden')};signupTab.onclick=()=>{mode='signup';signupTab.classList.add('active');loginTab.classList.remove('active');name.classList.remove('hidden')};
authForm.addEventListener('submit',async e=>{e.preventDefault();const c=initSupabase();authMessage.textContent='Patiente...';try{const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;if(mode==='signup'){const r=await c.auth.signUp({email,password,options:{data:{full_name:name.value}}});if(r.error)throw r.error;if(r.data.user)await c.from('profiles').upsert({id:r.data.user.id,email,full_name:name.value});location.href='index.html'}else{const r=await c.auth.signInWithPassword({email,password});if(r.error)throw r.error;location.href='index.html'}}catch(err){authMessage.textContent=err.message}});
</script><script src="scripts/v14-luxe.js?v=153"></script>
</body></html>
