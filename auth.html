<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Méthode Tee — Auth</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="auth-hero">
  <div class="auth-inner">
    <div class="auth-pill">🌿 Nutrition holistique · Pharmacopée · Bien-être</div>
    <h1 class="auth-title">Méthode<br><em>Tee</em></h1>
    <div class="auth-tag">Ton corps sait. Accompagne-le.</div>
    <p class="auth-copy">La première plateforme qui réunit nutrition holistique et pharmacie végétale — pour atteindre tes objectifs, traverser les moments difficiles, et prendre soin de toi au quotidien, naturellement.</p>
    <form class="auth-card" id="authForm">
      <div class="tabs">
        <button class="tab active" type="button" data-mode="signin">Connexion</button>
        <button class="tab" type="button" data-mode="signup">Inscription</button>
      </div>
      <div class="field hidden" id="nameField"><label>Nom</label><input id="fullName" placeholder="Ton prénom"></div>
      <div class="field"><label>Email</label><input id="email" type="email" required placeholder="email@exemple.com"></div>
      <div class="field"><label>Mot de passe</label><input id="password" type="password" required minlength="6" placeholder="••••••••"></div>
      <button class="btn sage full" type="submit">Continuer</button>
      <div id="authMsg" class="message"></div>
    </form>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
</body>
</html>
